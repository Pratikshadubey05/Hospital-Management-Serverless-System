{% extends 'base.html' %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 mt-5">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4 font-weight-bold">🔐 Portal Login</h3>
                    
                    {% if form.errors %}
                        <div class="alert alert-danger" role="alert">
                            Your username and password didn't match. Please try again.
                        </div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="id_username" class="form-label">Username</label>
                            <input type="text" name="username" autofocus required id="id_username" class="form-control" placeholder="Enter your username">
                        </div>

                        <div class="mb-3">
                            <label for="id_password" class="form-label">Password</label>
                            <input type="password" name="password" required id="id_password" class="form-control" placeholder="Enter your password">
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 mt-2">Sign In</button>
                    </form>
                </div>
            </div>
            <div class="text-center mt-3">
                <a href="{% url 'root_home' %}" class="text-muted small">← Return Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
