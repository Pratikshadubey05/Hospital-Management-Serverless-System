<!DOCTYPE html>
<html>
<head>
    <title>Hospital Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .sidebar {
            height: 100vh;
            background: #0d6efd;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            color: white;
            display: block;
            padding: 10px;
            text-decoration: none;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.2);
        }

        .card-box {
            border-radius: 12px;
            padding: 20px;
            color: white;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h4>🏥 HMS</h4>
            <a href="/">Dashboard</a>
            <a href="/admin/">Admin</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">
            {% block content %}
            {% endblock %}
        </div>

    </div>
</div>

</body>
</html>
